<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Building Editor</title>
    <script src="/pixi.js/pixi.js"></script>
    <script src="/assets/javascript/gameobjects/wallSectionUnit.js"></script>
    <script src="/vendor/earcut/dist/earcut.min.js"></script>
    <script src="/vendor/polygon-clipping/dist/polygon-clipping.umd.min.js"></script>
    <link rel="icon" type="image/png" href="/assets/images/wizard-hat-favicon.png">
    <link rel="stylesheet" href="./building-editor.css">
</head>
<body>
    <div class="appShell">
        <aside class="toolbar" aria-label="building editor tools">
            <button type="button" data-tool-mode="floor">Floor</button>
            <button type="button" data-tool-mode="walls">Walls</button>
            <div class="toolDivider" aria-hidden="true"></div>
            <button type="button" data-tool="edit" data-tool-visible-in="floor walls" class="iconTool" title="Edit vertices">
                <img src="/assets/images/thumbnails/edit.png" alt="">
            </button>
            <button type="button" data-tool="polygon" data-tool-visible-in="floor" class="iconTool" title="Add polygon">
                <img src="/assets/images/thumbnails/polygon.png" alt="">
            </button>
            <button type="button" data-tool="scissors" data-tool-visible-in="floor" class="iconTool" title="Subtract polygon">
                <img src="/assets/images/thumbnails/scissors.png" alt="">
            </button>
            <button type="button" data-tool="wall" data-tool-visible-in="walls" class="iconTool" title="Add wall">+</button>
            <button type="button" data-tool="paint" data-tool-visible-in="floor walls" class="iconTool" title="Paint texture">🎨</button>
            <div id="texturePalette" class="texturePalette" data-tool-visible-in="floor walls" hidden></div>
            <button type="button" id="finishDraft" data-tool-visible-in="floor">Finish</button>
            <button type="button" id="cancelDraft" data-tool-visible-in="floor">Cancel</button>
        </aside>

        <main class="workspace">
            <div class="controlBar">
                <label data-tool-visible-in="floor">
                    Elevation
                    <input id="floorElevation" type="number" step="0.25">
                </label>
                <label data-tool-visible-in="floor">
                    Height
                    <input id="floorHeight" type="number" min="0.1" step="0.1">
                </label>
                <label data-tool-visible-in="floor">
                    Floor texture
                    <select id="floorTexture"></select>
                </label>
                <label data-tool-visible-in="floor">
                    Roof texture
                    <select id="roofTexture"></select>
                </label>
                <button type="button" id="duplicateFloor" data-tool-visible-in="floor">Duplicate Floor</button>
                <label data-tool-visible-in="walls">
                    Wall height
                    <input id="wallHeight" type="number" min="0.1" step="0.1">
                </label>
                <label data-tool-visible-in="walls">
                    Wall texture
                    <select id="wallTexture"></select>
                </label>
                <label class="checkLabel">
                    <input id="snapToggle" type="checkbox" checked>
                    Snap anchors
                </label>
                <label class="checkLabel">
                    <input id="anchorToggle" type="checkbox">
                    Show anchors
                </label>
            </div>
            <div id="stageHost" tabindex="0"></div>
            <div class="statusBar">
                <span id="selectedSummary"></span>
                <span id="statusText"></span>
            </div>
        </main>

        <aside class="inspector" aria-label="building editor inspector">
            <section class="layerSection">
                <h2>Layers</h2>
                <div id="layerPanel" class="layerPanel"></div>
            </section>
            <section class="jsonSection">
                <h2>JSON</h2>
                <textarea id="jsonText" spellcheck="false"></textarea>
                <div class="buttonRow">
                    <button type="button" id="importJson">Import</button>
                    <button type="button" id="saveBrowser">Save</button>
                    <button type="button" id="loadBrowser">Load</button>
                </div>
            </section>
        </aside>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
