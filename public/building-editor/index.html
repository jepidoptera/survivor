<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Building Editor</title>
    <script src="/pixi.js/pixi.js"></script>
    <script src="/assets/javascript/wallGeometry.js"></script>
    <script src="/assets/javascript/shared/StairTraversal.js"></script>
    <script src="/assets/javascript/gameobjects/wallSectionUnit.js"></script>
    <script src="/assets/javascript/gameobjects/columnUnit.js"></script>
    <script src="/assets/javascript/gameobjects/beamUnit.js"></script>
    <script src="/assets/javascript/placeObjectPlacement.js"></script>
    <script src="/assets/javascript/rendering/ScenePicker.js"></script>
    <script src="/vendor/earcut/dist/earcut.min.js"></script>
    <script src="/vendor/polygon-clipping/dist/polygon-clipping.umd.min.js"></script>
    <link rel="icon" type="image/png" href="/assets/images/wizard-hat-favicon.png">
    <link rel="stylesheet" href="./building-editor.css">
</head>
<body>
    <div class="appShell">
        <main class="workspace">
            <div class="controlBar">
                <div class="toolCluster" aria-label="building editor tools">
                    <button type="button" id="mountTextureButton" data-tool-scope="mountObject" class="iconTool" title="Paint texture">🎨</button>
                    <div id="mountTexturePalette" class="texturePalette" hidden></div>
                    <button type="button" data-tool="paint" data-selection-scope="floor floorVertex roof gable gableHandle wall wallEndpoint column" class="iconTool" title="Paint texture">🎨</button>
                    <button type="button" id="stairTreadTextureButton" data-selection-scope="stair" data-stair-texture-part="tread" class="stairTextureButton" title="Stair tread texture"><span class="stairTextureIcon" aria-hidden="true">🎨</span><span>Tread</span></button>
                    <button type="button" id="stairRiserTextureButton" data-selection-scope="stair" data-stair-texture-part="riser" class="stairTextureButton" title="Stair riser texture"><span class="stairTextureIcon" aria-hidden="true">🎨</span><span>Riser</span></button>
                    <div id="texturePalette" class="texturePalette" hidden></div>
                </div>
                <label data-tool-scope="polygon scissors">
                    Elevation
                    <input id="polygonElevation" type="number" step="0.25">
                </label>
                <button type="button" id="polygonFinalize" data-tool-scope="polygon scissors" disabled>Finalize</button>
                <label data-selection-scope="level floor floorVertex">
                    Elevation
                    <input id="floorElevation" type="number" step="0.25">
                </label>
                <label data-selection-scope="level floor floorVertex">
                    Height
                    <input id="floorHeight" type="number" min="0.1" step="0.1">
                </label>
                <label data-selection-scope="roof roofVertex roofPeak roofShedDirection">
                    Mode
                    <select id="roofMode">
                        <option value="peak">Peak</option>
                        <option value="shed">Shed</option>
                        <option value="gabled">Gabled</option>
                        <option value="dome">Dome</option>
                    </select>
                </label>
                <label data-selection-scope="roof roofVertex roofPeak roofShedDirection">
                    Overhang
                    <input id="roofOverhang" type="number" step="0.1">
                </label>
                <label data-selection-scope="roof roofVertex roofPeak roofShedDirection">
                    Peak height
                    <input id="roofPeakHeight" type="number" min="0" step="0.1">
                </label>
                <label data-selection-scope="roof roofVertex roofPeak roofShedDirection">
                    Dome levels
                    <input id="roofDomeLevels" type="number" min="1" step="1">
                </label>
                <label data-selection-scope="gable gableHandle">
                    Gable height
                    <input id="gableHeight" type="range" min="0" max="3" step="0.1">
                </label>
                <input id="gableHeightValue" class="toolValue" data-selection-scope="gable gableHandle" type="number" min="0" max="3" step="0.1" title="Gable height value">
                <label class="checkLabel" data-selection-scope="gable gableHandle">
                    <input id="gableRoofReturn" type="checkbox" checked>
                    Roof return
                </label>
                <button type="button" data-tool="gable" data-selection-scope="roof gable gableHandle">Gable</button>
                <label data-selection-scope="wall wallEndpoint">
                    Wall height
                    <input id="wallHeight" type="number" min="0.1" step="0.1">
                </label>
                <label data-selection-scope="wall wallEndpoint">
                    Thickness
                    <input id="wallThickness" type="range" min="0.125" max="1" step="0.025">
                </label>
                <input id="wallThicknessValue" class="toolValue" data-selection-scope="wall wallEndpoint" type="number" min="0.125" max="1" step="0.025" title="Wall thickness value">
                <button type="button" id="wallInsetEndpoints" data-selection-scope="wall wallEndpoint" title="Inset vertex endpoints">Inset</button>
                <button type="button" id="wallProtrudeEndpoints" data-selection-scope="wall wallEndpoint" title="Protrude vertex endpoints">Protrude</button>
                <label data-selection-scope="column">
                    Depth
                    <input id="columnThickness" type="range" min="0.001" max="2" step="0.001">
                </label>
                <input id="columnThicknessValue" class="toolValue" data-selection-scope="column" type="number" min="0.001" max="2" step="0.001" title="Column depth value">
                <label data-selection-scope="column">
                    Width
                    <input id="columnWidth" type="range" min="0.001" max="2" step="0.001">
                </label>
                <input id="columnWidthValue" class="toolValue" data-selection-scope="column" type="number" min="0.001" max="2" step="0.001" title="Column width value">
                <label data-selection-scope="column">
                    Height
                    <input id="columnHeight" type="number" min="0.001" step="0.1" placeholder="wall">
                </label>
                <label data-selection-scope="column">
                    Sides
                    <input id="columnSideCount" type="number" min="3" max="12" step="1">
                </label>
                <label data-tool-scope="column">
                    Snap points / section
                    <input id="columnSnapPointsPerSection" type="number" min="1" max="64" step="1">
                </label>
                <label data-tool-scope="stair" data-selection-scope="stair">
                    Width
                    <input id="stairWidth" type="range" min="0.2" max="5" step="0.05">
                </label>
                <input id="stairWidthValue" class="toolValue" data-tool-scope="stair" data-selection-scope="stair" type="number" min="0.2" max="5" step="0.05" title="Stair width value">
                <label data-tool-scope="stair" data-selection-scope="stair">
                    Steps
                    <input id="stairStepCount" type="number" min="1" max="200" step="1">
                </label>
                <label data-tool-scope="stair" data-selection-scope="stair">
                    Riser depth
                    <input id="stairRiserDepth" type="number" min="0" step="0.05">
                </label>
                <fieldset class="toolRadioGroup" data-tool-scope="stair">
                    <legend>Direction</legend>
                    <label>
                        <input type="radio" name="stairDirection" value="up">
                        Up
                    </label>
                    <label>
                        <input type="radio" name="stairDirection" value="down">
                        Down
                    </label>
                </fieldset>
                <label data-tool-scope="mountObject">
                    Size
                    <input id="mountSize" type="range" min="0.2" max="5" step="0.05">
                </label>
                <input id="mountSizeValue" class="toolValue" data-tool-scope="mountObject" type="number" min="0.2" max="5" step="0.05" title="Size value">
                <label data-tool-scope="mountObject">
                    Aspect ratio
                    <input id="mountAspect" type="range" min="-2" max="2" step="0.02">
                </label>
                <input id="mountAspectValue" class="toolValue" data-tool-scope="mountObject" type="number" min="0.05" max="25" step="0.01" title="Aspect ratio value">
                <label data-tool-scope="mountObject">
                    Snap points / section
                    <input id="mountSnapPointsPerSection" type="number" min="1" max="64" step="1">
                </label>
                <label class="checkLabel" data-tool-exclude="mountObject polygon scissors stair" data-selection-exclude="roof gable gableHandle stair">
                    <input id="snapToggle" type="checkbox">
                    Snap to grid
                </label>
                <label class="checkLabel" data-tool-exclude="mountObject polygon scissors stair" data-selection-exclude="roof gable gableHandle stair">
                    <input id="snapDirectionToggle" type="checkbox">
                    Snap direction
                </label>
                <label class="checkLabel" data-tool-exclude="mountObject polygon scissors stair" data-selection-exclude="roof gable gableHandle stair">
                    <input id="anchorToggle" type="checkbox">
                    Show anchors
                </label>
                <button type="button" id="playtestToggle" class="iconTool playtestToolButton playtestTopButton" title="Playtest wizard movement">
                    <img src="/assets/images/wizard-hat-favicon.png" alt="">
                </button>
            </div>
            <div class="stageFrame">
                <div class="sideToolbar" aria-label="wall fixture tools">
                    <button type="button" class="iconTool sideToolButton roofToolButton" title="Create roof">
                        <span id="roofToolIcon" class="roofToolIcon" aria-hidden="true">
                            <span class="roofToolFace roofToolFaceTextured"></span>
                            <span class="roofToolFace roofToolFaceShade"></span>
                            <span class="roofToolRidge"></span>
                        </span>
                    </button>
                    <button type="button" class="iconTool sideToolButton wallToolButton" id="structureToolButton" title="Place walls" aria-haspopup="true" aria-controls="structureToolMenu">
                        <span id="structureToolIcon" class="structureToolIcon" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="iconTool sideToolButton mountToolButton" data-mount-category="doors" title="Place doors">
                        <img src="/assets/images/doors/door5.png" alt="">
                    </button>
                    <button type="button" class="iconTool sideToolButton mountToolButton" data-mount-category="windows" title="Place windows">
                        <img src="/assets/images/windows/window.png" alt="">
                    </button>
                    <button type="button" class="iconTool sideToolButton polygonToolButton" data-tool="polygon" title="Add floor polygon">
                        <img src="/assets/images/thumbnails/polygon.png" alt="">
                    </button>
                    <button type="button" class="iconTool sideToolButton scissorsToolButton" data-tool="scissors" title="Cut floor hole">
                        <img src="/assets/images/thumbnails/scissors.png" alt="">
                    </button>
                    <button type="button" class="iconTool sideToolButton stairToolButton" data-tool="stair" title="Place stairs">
                        <span id="stairToolIcon" class="stairToolIcon" aria-hidden="true"></span>
                    </button>
                </div>
                <div id="structureToolMenu" class="structureToolMenu" hidden>
                    <button type="button" class="iconTool structureToolMenuButton" data-structure-tool="wall" title="Place walls" aria-label="Place walls">
                        <span id="wallToolIcon" class="wallToolIcon" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="iconTool structureToolMenuButton" data-structure-tool="column" title="Place columns" aria-label="Place columns">
                        <span id="columnToolIcon" class="columnToolIcon" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="iconTool structureToolMenuButton" data-structure-tool="beam" title="Place beams" aria-label="Place beams">
                        <span id="beamToolIcon" class="beamToolIcon" aria-hidden="true"></span>
                    </button>
                </div>
                <div id="stageHost" tabindex="0">
                    <div id="playtestFpsCounter" class="playtestFpsCounter" hidden>0 fps</div>
                </div>
            </div>
            <div class="statusBar">
                <span id="selectedSummary"></span>
                <span id="statusText"></span>
            </div>
        </main>

        <aside class="inspector" aria-label="building editor inspector">
            <section class="layerSection">
                <h2>Layers</h2>
                <div id="layerPanel" class="layerPanel"></div>
            </section>
            <section class="jsonSection">
                <h2>JSON</h2>
                <textarea id="jsonText" spellcheck="false" readonly></textarea>
                <div class="buttonRow">
                    <button type="button" id="saveBuilding">Save</button>
                    <button type="button" id="openBuilding">Open</button>
                    <button type="button" id="newBuilding">New</button>
                </div>
            </section>
        </aside>
    </div>
    <div id="windowContextMenu" class="contextMenu" hidden>
        <div class="contextMenuTitle">select:</div>
        <div class="contextMenuSeparator"></div>
        <button type="button" data-window-select="level">this level</button>
        <button type="button" data-window-select="column">this column</button>
        <button type="button" data-window-select="texture">same texture</button>
        <button type="button" data-window-select="all">all</button>
    </div>
    <div id="layerContextMenu" class="contextMenu" hidden>
        <div class="contextMenuTitle">level:</div>
        <div class="contextMenuSeparator"></div>
        <button type="button" data-layer-duplicate-position="above">add duplicate above</button>
        <button type="button" data-layer-duplicate-position="below">add duplicate below</button>
    </div>

    <div id="buildingOpenDialog" class="modalOverlay" hidden>
        <div class="modalPanel" role="dialog" aria-modal="true" aria-labelledby="buildingOpenTitle">
            <h2 id="buildingOpenTitle">Open Building</h2>
            <div id="buildingOpenMessage" class="modalMessage"></div>
            <div id="buildingSaveList" class="buildingSaveList"></div>
            <div class="modalButtonRow">
                <button type="button" id="openNewBuilding">New Building</button>
                <button type="button" id="closeBuildingOpenDialog">Cancel</button>
            </div>
        </div>
    </div>

    <div id="buildingNameDialog" class="modalOverlay" hidden>
        <form id="buildingNameForm" class="modalPanel" role="dialog" aria-modal="true" aria-labelledby="buildingNameTitle">
            <h2 id="buildingNameTitle">New Building</h2>
            <label class="modalField">
                Name
                <input id="buildingNameInput" type="text" maxlength="80" autocomplete="off" required>
            </label>
            <div id="buildingNameMessage" class="modalMessage"></div>
            <div class="modalButtonRow">
                <button type="submit" id="createNamedBuilding">Create</button>
                <button type="button" id="cancelBuildingName">Cancel</button>
            </div>
        </form>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
